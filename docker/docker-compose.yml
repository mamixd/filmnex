# docker/docker-compose.yml
version: '3.9'

services:
  # ── BACKEND ───────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cinemax-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=cinemax
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cinemax-network
    volumes:
      - backend-logs:/app/logs

  # ── FRONTEND ──────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cinemax-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3001/api
      - NEXT_PUBLIC_CDN_URL=${CDN_URL}
    depends_on:
      - backend
    networks:
      - cinemax-network

  # ── MONGODB ───────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: cinemax-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=cinemax
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemax-network

  # ── REDIS ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cinemax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemax-network

  # ── BULL DASHBOARD (dev/staging) ──────────────────────
  bull-board:
    image: deadly0/bull-board
    container_name: cinemax-bull-board
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - cinemax-network
    profiles:
      - dev

  # ── NGINX REVERSE PROXY ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cinemax-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cinemax-network

volumes:
  mongo-data:
  redis-data:
  backend-logs:

networks:
  cinemax-network:
    driver: bridge
