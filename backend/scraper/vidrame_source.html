<script>
function convertQualityLabel(w)
{
    var ql = '';
    if (w >= 4100 && w < 8000) {
        ql = '4320';
    } else if (w >= 3200 && w < 4100) {
        ql = '2160';
    } else if (w >= 2100 && w < 3200) {
        ql = '1440';
    } else if (w >= 1400 && w < 2100) {
        ql = '1080';
    } else if (w >= 900 && w < 1400) {
        ql = '720';
    } else if (w >= 650 && w < 900) {
        ql = '480';
    } else if (w >= 450 && w < 650) {
        ql = '360';
    } else if (w >= 300 && w < 450) {
        ql = '240';
    } else if (w >= 100 && w < 300) {
        ql = '144';
    }
    qlLabel = ql + 'p';
    if (ql == '4320') {
        qlLabel += ' (8K)';
    } else if (ql == '2160') {
        qlLabel += ' (4K)';
    } else if (ql == '1440') {
        qlLabel += ' (2K)';
    }
    return qlLabel;
}

        });
    });
}

}

jwpl.on("levelsChanged", function(callback) {
    var curr = callback.currentQuality;
    var label = convertQualityLabel(jwpl.getQualityLevels()[curr]['width']);
    if (curr == 0) label = 'Auto';
    $('.quality-label').text(label);
});
jwpl.on('captionsList', function(item) {
    item.tracks.forEach(function(track, i) {
        if (track.id == 'off') return;
        if (track.language == 'tr' || track.language == 'tur') {
            trAltyazi = i;
        } else if (track.language == 'forced') {
            forcedCaption = i;
            jwpl.setCurrentCaptions(i);
            setTimeout(function() {
                var forcedBtnEl = $('.jw-settings-submenu-captions .jw-settings-submenu-items .jw-settings-content-item').eq(i);
                var forcedBtnElClone = $('.jw-settings-submenu-captions .jw-settings-submenu-items .jw-settings-content-item').eq(i).text('Default (Forced)');
                forcedBtnEl.remove();
                $('.jw-settings-submenu-captions .jw-settings-submenu-items .jw-settings-content-item[aria-label="Kapalı"]').remove();
                $('.jw-settings-submenu-captions .jw-settings-submenu-items').prepend(forcedBtnElClone);
                //$('.jw-settings-submenu-captions .jw-settings-submenu-items .jw-settings-content-item').eq(i).hide();
            }, 1000);
        }
    });
});

jwpl.on("audioTracks", function(item) {
    if (!forcedCaption) {
        jwpl.setCurrentCaptions(0);
    }
    
    audioTracks = item.tracks;
    currentAudioTrackIndex = item.currentTrack;
    var currAudioTrack = audioTracks[currentAudioTrackIndex];
    if (jwpl.getCaptionsList().length > 1) {
        if (currAudioTrack.language != 'tr' && currAudioTrack.language != 'tur' || countCaptions() == 1) {
            if (curCaptionIndex !== trAltyazi) {
                jwpl.setCurrentCaptions(trAltyazi);
            }
        } else {
            if (curCaptionIndex !== 0 && !forcedCaption) {
                jwpl.setCurrentCaptions(0);
            }
        }
    }
    // default audio
    if (audioTracks[0].language != 'tr') {
        for (var i = 0; i < audioTracks.length; i++) {
            if (audioTracks[i].language == 'tr' || audioTracks[i].language == 'tur') {
                window.defAudioTrack = i;
                defAudioTrack = i;
            }
        }
    } else {
        window.defAudioTrack = 0;
        defAudioTrack = 0;
    }
    if (!audioLoaded && audioTracks.length > 1) {
        jwpl.addButton(
            "player/img/dualy.svg",
            "Dual Ses",
            function() {
                if ($('.jw-settings-open').length == 0) {
                    jwMenuAc();
                } else {
                    jwMenuKapa();
                }
            },
            "dilsec-btn"
        );
        /*$('.jw-controlbar').prepend(`
            <div class="video-presets">
                <button data-preset="0" class="btn btn-sm btn-warning">Türkçe Dublaj</button>
                ${(trAltyazi ? '<button data-preset="1" class="btn btn-sm btn-outline">Türkçe Altyazılı</button>' : '')}                                
                <button data-preset="2" class="btn btn-sm btn-outline">Orijinal (Altyazısız)</button>
            </div>
        `);*/
        $('.jw-controlbar').prepend(
            '<div class="video-presets">' +
            '<button data-preset="0" class="btn btn-sm btn-warning" style="margin-right:10px;">Türkçe Dublaj</button>' +
            (trAltyazi ? '<button data-preset="1" class="btn btn-sm btn-outline" style="margin-right:10px;">Türkçe Altyazılı</button>' : '') +
            '<button data-preset="2" class="btn btn-sm btn-outline">Orijinal (Altyazısız)</button>' +
            '</div>'
        );
    }
    if (isIOS()) {
        setTimeout(function(){
            $('#jw-playerArea-settings-submenu-captions .jw-settings-submenu-items .jw-settings-content-item').each(function(){
                if ($(this).text() == 'CC') {
                    $(this).remove();
                }
            });
        }, 300);
    }
    audioLoaded = 1;
});
$('body').on('click', '[data-preset]', function() {
    const preset = $(this).attr('data-preset');

    $('[data-preset]').not(this).removeClass('btn-warning').addClass('btn-outline');
    $(this).removeClass('btn-outline btn-warning').addClass('btn-warning');

    if (preset === '0') {
        jwpl.setCurrentAudioTrack(window.defAudioTrack);
        if (!forcedCaption) {
            jwpl.setCurrentCaptions(0);
        } else {
            jwpl.setCurrentCaptions(forcedCaption);
        }
    }
    if (preset === '1') {
        if (defAudioTrack === '1') {
            jwpl.setCurrentAudioTrack(0);
        } else {
            jwpl.setCurrentAudioTrack(1);
        }
        if (trAltyazi) {
            jwpl.setCurrentCaptions(trAltyazi);
        }
    }
    if (preset === '2') {
        if (defAudioTrack === '1') {
            jwpl.setCurrentAudioTrack(0);
        } else {
            jwpl.setCurrentAudioTrack(1);
        }
        jwpl.setCurrentCaptions(0);
    }
});
jwpl.on('captionsChanged', function(item) {
    curCaptions = item.tracks[item.track];
    curCaptionIndex = item.track;
});
jwpl.once("play", function() {
    "use strict";
    var levels = jwpl.getQualityLevels(),
        curr = jwpl.getCurrentQuality();
    var label = convertQualityLabel(jwpl.getQualityLevels()[curr]['width']);
    if (curr == 0) label = 'Auto';
    $('.jw-icon-settings.jw-settings-submenu-button').append('<span class="quality-label">' + label + '</span>');

    if (localStorage['0a1559fd_CurrentPos'] == '' || localStorage['0a1559fd_CurrentPos'] == 'undefined') {
        var currentPosition = 0;
    } else {
        if (localStorage['0a1559fd_CurrentPos'] == "null") {
            localStorage['0a1559fd_CurrentPos'] = 0;
        } else {
            var currentPosition = localStorage['0a1559fd_CurrentPos'];
        }
    }
    /*if (currentPosition > 0 && Math.abs(jwplayer().getDuration() - currentPosition) > 5) {*/
    if (currentPosition > 30) {
        getNotification('success', 'Kaldığın yerden izlemeye devam ediyorsun :)');
        jwplayer().seek(currentPosition);
    }
    window.onunload = function() {
        localStorage['0a1559fd_CurrentPos'] = jwplayer().getPosition();
    };
    window.addEventListener('unload', function() {
        var params = JSON.stringify({
            "time": jwplayer().getPosition(),
            "percent": (100 * jwpl.getPosition() / jwpl.getDuration()),
            "ud": '',
            "vid": ''
        });
    });
});

function JWWatchGuard() {
    const minSeconds = Number(600);
    const key = lsx;

    let startedAt = null;
    let playSeconds = 0;
    let intervalId = null;
    let sv = false;

    function saveNow() {
        if (sv) return;
        sv = true;
        const now = Date.now();
        const payload = {
            s: startedAt,     // start timestamp
            e: now,           // end timestamp
            t: playSeconds
        };
        localStorage.setItem(key, JSON.stringify(payload));
    }
    function startTicking() {
        if (intervalId) return;
        if (!startedAt) startedAt = Date.now();
        intervalId = setInterval(() => {
            if (jwpl.getState() === "playing") {
                playSeconds += 1;
                if (!sv && playSeconds >= minSeconds) {
                    saveNow();
                }
            }
        }, 1000);
    }
    function stopTicking() {
        if (!intervalId) return;
        clearInterval(intervalId);
        intervalId = null;
    }
    function validate() {
        const raw = localStorage.getItem(key);
        if (!raw) return false;
        try {
            const d = JSON.parse(raw);
            if (!d) throw 1;
            if (typeof d.s !== "number" || typeof d.e !== "number" || typeof d.t !== "number") throw 2;
            if (d.t < minSeconds) throw 3;
            if ((d.e - d.s) / 1000 < minSeconds) throw 4;

            return true;
        } catch (e) {
            localStorage.removeItem(key); // manuel set / bozuk veri -> sil
            return false;
        }
    }

        jwpl.on("play", startTicking);
    jwpl.on("pause", stopTicking);

        document.addEventListener("visibilitychange", () => {
        if (document.hidden) stopTicking();
        else startTicking();
    });

        window.addEventListener("beforeunload", () => {
        if (playSeconds >= minSeconds) saveNow();
    });

    return {
        isWatched: validate,
        clear: () => localStorage.removeItem(key),
        getDebug: () => ({ startedAt, playSeconds, sv })
    };
}
const jg = JWWatchGuard();
jg.isWatched();
